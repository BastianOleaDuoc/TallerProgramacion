<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mestrax · Contacto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header class="shadow-sm bg-white">
<div class="container d-flex flex-wrap justify-content-between align-items-center py-3">

<h1 class="m-0">
<a href="./index.html" class="text-decoration-none text-dark fw-bold">
Mestrax
</a>
</h1>

<nav class="d-flex flex-wrap gap-3 mt-2 mt-md-0">
<a href="./index.html" class="nav-link">Inicio</a>
<a href="./producto.html" class="nav-link">Productos</a>
<a href="./carrito.html" class="nav-link">
Carrito <span id="cart-count" class="badge bg-dark">0</span>
</a>
<a href="./contactos.html" class="nav-link fw-bold text-dark">Contacto</a>
</nav>

</div>
</header>

<main class="container py-5">

<h2 class="text-center fw-bold mb-3">Contáctanos</h2>

<p class="text-center text-muted mb-4">
¿Tienes dudas, reservas o sugerencias? Escríbenos.
</p>

<section class="card shadow border-0 rounded-4 p-4 mx-auto" style="max-width:600px;">

<form id="contactForm">

<div class="mb-3">
<label class="form-label">Nombre</label>
<input type="text" id="nombre" class="form-control" placeholder="Tu nombre">
</div>

<div class="mb-3">
<label class="form-label">Correo</label>
<input type="email" id="email" class="form-control" placeholder="correo@mestrax.com">
</div>

<div class="mb-3">
<label class="form-label">Teléfono</label>
<input type="text" id="telefono" class="form-control" placeholder="+56 9 1234 5678">
</div>

<div class="mb-3">
<label class="form-label">Mensaje</label>
<textarea id="mensaje" rows="4" class="form-control" placeholder="Escribe tu mensaje"></textarea>
</div>

<button class="btn btn-dark w-100">
Enviar mensaje
</button>

</form>

</section>

</main>

<script src="../js/carrito.js"></script>

<script>
document.getElementById("contactForm").addEventListener("submit",function(e){
e.preventDefault();

alert("Mensaje enviado correctamente");
this.reset();
});
</script>

</body>
</html>
