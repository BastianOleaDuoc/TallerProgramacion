<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mestrax · Contacto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header>
  <div class="container">
    <h1 class="m-0">
      <a href="./index.html">Mestrax</a>
    </h1>
    <nav>
      <a href="./index.html"><i class="bi bi-house me-1"></i>Inicio</a>
      <a href="./producto.html"><i class="bi bi-shop me-1"></i>Productos</a>
      <a href="./carrito.html"><i class="bi bi-cart me-1"></i>Carrito <span id="cart-count" class="badge bg-danger">0</span></a>
      <a href="./reserva.html"><i class="bi bi-calendar-check me-1"></i>Reserva</a>
      <a href="./contactos.html" class="active"><i class="bi bi-telephone me-1"></i>Contacto</a>
      <a href="./login.html"><i class="bi bi-person me-1"></i>Usuario</a>
      <a href="./loginAdmin.html"><i class="bi bi-gear me-1"></i>Admin</a>
    </nav>
  </div>
</header>

<main class="container py-5">

<h2 class="text-center fw-bold mb-3">Contáctanos</h2>

<p class="text-center text-muted mb-4">
¿Tienes dudas, reservas o sugerencias? Escríbenos.
</p>

<section class="card shadow border-0 rounded-4 p-4 mx-auto" style="max-width:600px;">

<form id="contactForm">

<div class="mb-3">
<label class="form-label">Nombre</label>
<input type="text" id="nombre" class="form-control" placeholder="Tu nombre">
</div>

<div class="mb-3">
<label class="form-label">Correo</label>
<input type="email" id="email" class="form-control" placeholder="correo@mestrax.com">
</div>

<div class="mb-3">
<label class="form-label">Teléfono</label>
<input type="text" id="telefono" class="form-control" placeholder="+56 9 1234 5678">
</div>

<div class="mb-3">
<label class="form-label">Mensaje</label>
<textarea id="mensaje" rows="4" class="form-control" placeholder="Escribe tu mensaje"></textarea>
</div>

<button class="btn btn-dark w-100">
Enviar mensaje
</button>

</form>

</section>

</main>

<script src="../js/carrito.js"></script>

<script>
document.getElementById("contactForm").addEventListener("submit",function(e){
e.preventDefault();

alert("Mensaje enviado correctamente");
this.reset();
});
</script>

</body>
</html>
