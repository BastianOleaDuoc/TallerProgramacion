<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestrax | Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<script src="../js/header.js"></script>

<main class="container py-5">
    <section class="text-center mb-5 mt-3">
        <div class="badge-modern mb-3">Menú Exclusivo</div>
        <h2 class="fw-bolder m-0 display-5">Nuestra <span class="text-gradient">Selección</span></h2>
    </section>

    <section class="mb-5">
        <div class="filter-bar-modern d-flex flex-column flex-md-row align-items-center gap-2 p-2 mx-auto" style="max-width: 900px;">
            <div class="position-relative flex-grow-1 w-100">
                <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-4 text-muted fs-5"></i>
                <input type="text" id="buscar" class="form-control border-0 ps-5 py-3 shadow-none text-white w-100" placeholder="Busca tu plato o bebida favorita..." style="background: transparent !important; font-size: 1.05rem;">
            </div>
            
            <div class="divider"></div>
            
            <div class="position-relative w-100 category-select-container">
                <i class="bi bi-funnel position-absolute top-50 start-0 translate-middle-y ms-4 text-muted z-1"></i>
                <select id="categoria" class="form-select border-0 ps-5 py-3 shadow-none text-white w-100 fw-medium" style="background: rgba(255,255,255,0.05) !important; cursor: pointer;">
                    <option value="Todas" class="text-dark">🍽️ Todo el menú</option>
                    <option value="Hamburguesas" class="text-dark">🍔 Hamburguesas</option>
                    <option value="Entradas" class="text-dark">🍟 Entradas</option>
                    <option value="Chorrillanas" class="text-dark">🥩 Chorrillanas</option>
                    <option value="Tragos" class="text-dark">🍸 Coctelería</option>
                    <option value="Mocktails" class="text-dark">🍹 Mocktails</option>
                    <option value="Cafeteria" class="text-dark">☕ Cafetería</option>
                    <option value="Postres" class="text-dark">🍰 Postres</option>
                </select>
            </div>
        </div>
    </section>

    <section>
        <div id="grid" class="grid row g-4"></div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/producto.js"></script>
</body>
</html>
