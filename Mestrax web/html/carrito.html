<!-- carrito.html -->
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mestrax · Carrito</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header class="shadow-sm bg-white">
<div class="container d-flex flex-wrap justify-content-between align-items-center py-3">

<h1 class="m-0">
<a href="./index.html" class="text-decoration-none text-dark fw-bold">
Mestrax
</a>
</h1>

<nav class="d-flex flex-wrap gap-3 mt-2 mt-md-0">
<a href="./index.html" class="nav-link">Inicio</a>
<a href="./producto.html" class="nav-link">Productos</a>
<a href="./carrito.html" class="nav-link fw-bold text-dark">
Carrito <span id="cart-count" class="badge bg-dark">0</span>
</a>
<a href="./contactos.html" class="nav-link">Contacto</a>
<a id="usuarioLink" href="./login.html" class="nav-link">Usuario</a>
<a href="./loginAdmin.html" class="nav-link">Admin</a>
</nav>

</div>
</header>

<main class="container py-5">

<h2 class="text-center fw-bold mb-4">Carrito de Compras</h2>

<section id="empty" class="card p-4 text-center shadow d-none">
<p class="mb-3">Tu carrito está vacío</p>

<a href="./producto.html" class="btn btn-dark">
Ver productos
</a>
</section>

<section id="cartWrap" class="d-none">

<div class="table-responsive shadow rounded-4">

<table class="table align-middle mb-0">

<thead class="table-dark">
<tr>
<th>Producto</th>
<th class="text-end">Precio</th>
<th class="text-end">Cantidad</th>
<th class="text-end">Subtotal</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr>
<td colspan="3" class="text-end fw-bold">Total:</td>
<td id="total" class="text-end fw-bold">$0</td>
<td></td>
</tr>
</tfoot>

</table>

</div>

<div class="d-flex justify-content-end gap-3 mt-4">

<button onclick="vaciarCarrito()" class="btn btn-outline-danger">
Vaciar carrito
</button>

<button onclick="pagar()" class="btn btn-dark">
Pagar
</button>

</div>

</section>

</main>

<script src="../js/navbar.js"></script>
<script src="../js/carrito.js"></script>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
document.getElementById("cart-count").textContent = carrito.length;
actualizarNavbar();
mostrarCarrito();
</script>

</body>
</html>
