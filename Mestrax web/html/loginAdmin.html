<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mestrax · Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header class="shadow-sm bg-white">
<div class="container d-flex flex-wrap justify-content-between align-items-center py-3">

<h1 class="m-0">
<a href="./index.html" class="text-decoration-none text-dark fw-bold">
Mestrax
</a>
</h1>

<nav class="d-flex flex-wrap gap-3 mt-2 mt-md-0">
<a href="./index.html" class="nav-link">Inicio</a>
<a href="./producto.html" class="nav-link">Productos</a>
<a href="./carrito.html" class="nav-link">
Carrito <span id="cart-count" class="badge bg-dark">0</span>
</a>
<a href="./loginAdmin.html" class="nav-link fw-bold text-dark">Admin</a>
</nav>

</div>
</header>

<main class="container py-5">

<section class="mx-auto" style="max-width:450px;">

<div class="card shadow border-0 rounded-4 p-4">

<h2 class="text-center fw-bold mb-4">Panel Administrativo</h2>

<form id="adminForm">

<div class="mb-3">
<label class="form-label">Correo corporativo</label>
<input type="email" id="email" class="form-control" placeholder="admin@mestrax.com">
</div>

<div class="mb-3">
<label class="form-label">Contraseña</label>
<input type="password" id="password" class="form-control" placeholder="••••••••">
</div>

<button class="btn btn-dark w-100">
Ingresar
</button>

</form>

<p class="text-center mt-3">
Solo personal autorizado
</p>

</div>

</section>

</main>

<script src="../js/loginAdmin.js"></script>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
document.getElementById("cart-count").textContent = carrito.length;
iniciarLoginAdmin();
</script>

</body>
</html>
