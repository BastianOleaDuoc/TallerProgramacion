<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mestrax · Iniciar Sesión</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header class="shadow-sm bg-white">
<div class="container d-flex flex-wrap justify-content-between align-items-center py-3">

<h1 class="m-0">
<a href="./index.html" class="text-decoration-none text-dark fw-bold">
Mestrax
</a>
</h1>

<nav class="d-flex flex-wrap gap-3 mt-2 mt-md-0">
<a href="./index.html" class="nav-link">Inicio</a>
<a href="./producto.html" class="nav-link">Productos</a>
<a href="./carrito.html" class="nav-link">
Carrito <span id="cart-count" class="badge bg-dark">0</span>
</a>
<a href="./contactos.html" class="nav-link">Contacto</a>
<a id="usuarioLink" href="./login.html" class="nav-link">Usuario</a>
<a href="./loginAdmin.html" class="nav-link">Admin</a>
</nav>

</div>
</header>

<main class="container py-5">

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow p-4 border-0 rounded-4">

<h2 class="text-center fw-bold mb-4">Acceso Mestrax</h2>

<form id="loginForm">

<div class="mb-3">
<label class="form-label">Correo electrónico</label>
<input type="email" id="email" class="form-control" placeholder="correo@gmail.com">
</div>

<div class="mb-3">
<label class="form-label">Contraseña</label>
<input type="password" id="password" class="form-control" placeholder="••••••••">
</div>

<button class="btn btn-dark w-100 mt-2">
Ingresar
</button>

</form>

<p class="text-center mt-3">
¿No tienes cuenta?
<a href="./registro.html" class="fw-bold text-dark">Regístrate</a>
</p>

<p class="text-center">
<a href="./loginAdmin.html" class="text-secondary">Ingresar como administrador</a>
</p>

</div>
</div>
</div>

</main>

<script src="../js/navbar.js"></script>
<script src="../js/login.js"></script>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
document.getElementById("cart-count").textContent = carrito.length;
actualizarNavbar();
iniciarLogin();
</script>

</body>
</html>
