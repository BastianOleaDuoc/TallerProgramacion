<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mestrax · Iniciar Sesión</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header>
  <div class="container">
    <h1 class="m-0">
      <a href="./index.html">Mestrax</a>
    </h1>
    <nav>
      <a href="./index.html"><i class="bi bi-house me-1"></i>Inicio</a>
      <a href="./producto.html"><i class="bi bi-shop me-1"></i>Productos</a>
      <a href="./carrito.html"><i class="bi bi-cart me-1"></i>Carrito <span id="cart-count" class="badge bg-danger">0</span></a>
      <a href="./reserva.html"><i class="bi bi-calendar-check me-1"></i>Reserva</a>
      <a href="./contactos.html"><i class="bi bi-telephone me-1"></i>Contacto</a>
      <a href="./login.html" class="active"><i class="bi bi-person me-1"></i>Usuario</a>
      <a href="./loginAdmin.html"><i class="bi bi-gear me-1"></i>Admin</a>
    </nav>
  </div>
</header>

<main class="container py-5">

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow p-4 border-0 rounded-4">

<h2 class="text-center fw-bold mb-4">Acceso Mestrax</h2>

<form id="loginForm">

<div class="mb-3">
<label class="form-label">Correo electrónico</label>
<input type="email" id="email" class="form-control" placeholder="correo@gmail.com">
</div>

<div class="mb-3">
<label class="form-label">Contraseña</label>
<input type="password" id="password" class="form-control" placeholder="••••••••">
</div>

<button class="btn btn-dark w-100 mt-2">
Ingresar
</button>

</form>

<p class="text-center mt-3">
¿No tienes cuenta?
<a href="./registro.html" class="fw-bold text-dark">Regístrate</a>
</p>

<p class="text-center">
<a href="./loginAdmin.html" class="text-secondary">Ingresar como administrador</a>
</p>

</div>
</div>
</div>

</main>

<script src="../js/navbar.js"></script>
<script src="../js/login.js"></script>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
document.getElementById("cart-count").textContent = carrito.length;
actualizarNavbar();
iniciarLogin();
</script>

</body>
</html>
