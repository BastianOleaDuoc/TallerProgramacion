<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mestrax · Mi Perfil</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <script src="../js/header.js"></script>

  <main class="container py-5">
    <div class="row justify-content-center g-4">
      
      <div class="col-md-5">
        <div class="card shadow p-4 border-0 rounded-4 bg-dark text-white" style="border: 1px solid #333 !important;">
          <h2 class="text-center fw-bold mb-4"><i class="bi bi-person-circle me-2"></i>Mi Perfil</h2>
          <div id="perfilContent">
            <p class="text-center text-muted">Cargando datos del usuario...</p>
          </div>
        </div>
      </div>

      <div class="col-md-7">
        <div class="card shadow p-4 border-0 rounded-4 bg-dark text-white" style="border: 1px solid #333 !important;">
          <h3 class="fw-bold mb-4 text-warning"><i class="bi bi-bag-check me-2"></i>Mis Compras</h3>
          
          <div class="table-responsive">
            <table class="table table-dark table-hover m-0 align-middle">
              <thead>
                <tr>
                  <th>N°</th>
                  <th>Fecha</th>
                  <th>Productos</th>
                  <th>Total</th>
                  <th>Pago</th>
                  <th>Estado</th>
                </tr>
              </thead>
              <tbody id="contenedorHistorial">
                <tr>
                  <td colspan="6" class="text-center text-muted py-3">
                    <div class="spinner-border spinner-border-sm text-warning me-2" role="status"></div>
                    Buscando tus compras...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </div>

    </div>
  </main>

  <script src="../js/perfil.js"></script>

  <script>

    document.addEventListener("DOMContentLoaded", () => {

      if (typeof cargarPerfil === "function") {
        cargarPerfil();
      }
      

      if (typeof actualizarNavbar === "function") {
        actualizarNavbar();
      }
    });
  </script>

</body>
</html>
